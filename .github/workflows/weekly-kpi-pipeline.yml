name: Weekly KPI Pipeline

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8:00 AM UTC
  workflow_dispatch:        # Allows manual trigger from the Actions tab too

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd scripts
          pip install -r requirements.txt

      - name: Run KPI pipeline
        env:
          KPI_DB_HOST: ${{ secrets.KPI_DB_HOST }}
          KPI_DB_USER: ${{ secrets.KPI_DB_USER }}
          KPI_DB_PASSWORD: ${{ secrets.KPI_DB_PASSWORD }}
          KPI_DB_PORT: ${{ secrets.KPI_DB_PORT }}
          KPI_DB_NAME: ${{ secrets.KPI_DB_NAME }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: |
          cd scripts
          python send_to_slack.py
